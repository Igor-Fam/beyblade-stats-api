<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BX Battle Logger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <h1>Battle Logger</h1>
      
      <div class="battle-setup">
        <!-- Player 1 Card -->
        <div class="combo-card player-0">
          <h2>Combo A</h2>
          <div class="field">
            <label>Line</label>
            <select id="line-0"></select>
          </div>
          <div id="parts-0" class="parts-container">
            <!-- Dynamic parts here -->
          </div>
        </div>

        <!-- Player 2 Card -->
        <div class="combo-card player-1">
          <h2>Combo B</h2>
          <div class="field">
            <label>Line</label>
            <select id="line-1"></select>
          </div>
          <div id="parts-1" class="parts-container">
            <!-- Dynamic parts here -->
          </div>
        </div>
      </div>

      <div class="result-section">
        <h2>Match Result</h2>
        
        <label>Who won?</label>
        <div class="winner-toggle">
          <button class="winner-btn p0 active" data-index="0">Combo A</button>
          <button class="winner-btn p1" data-index="1">Combo B</button>
        </div>

        <label style="margin-top: 1.5rem">Finish Type</label>
        <div id="finish-types" class="finish-types">
          <!-- Buttons generated by JS -->
        </div>

        <button id="submit-battle" class="btn btn-primary">Register Battle</button>
      </div>

    </div>
    
    <div id="status"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
